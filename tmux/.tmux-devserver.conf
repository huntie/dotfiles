# Plugin-free tmux config for devservers

# - Common configuration -

source-file ~/.tmux-common.conf

# - Options -

set-option -g default-command "fish"

# Terminal settings for Ghostty
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-overrides ",xterm-ghostty:Tc"

# Set window title to the pane title (from child processes) suffixed with hostname
set -g set-titles-string '#{pane_title} [#{host}]'

# - Auto-setup hook for new sessions -

set-hook -g session-created 'run-shell "~/.tmux-devserver-setup.sh"'

# - Local key bindings -

bind r source-file ~/.tmux-devserver.conf
